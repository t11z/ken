name: pages

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: prepare site source
        run: |
          mkdir -p site/src

          # Use the README as the site index, with a minimal rewrite to
          # resolve relative links that point into the repo.
          cp README.md site/src/README.md

          # Copy documentation sections into the book layout.
          cp -r docs site/src/docs

          # Generate SUMMARY.md dynamically from the docs present on disk so
          # that new ADRs and documentation sections are included automatically
          # without manual workflow updates.
          {
            printf '# Summary\n\n'
            printf '[Ken](README.md)\n\n'

            printf '# Architecture Decision Records\n\n'
            for f in site/src/docs/adr/*.md; do
              [ -f "$f" ] || continue
              title=$(grep -m1 '^# ' "$f" | sed 's/^# //')
              printf -- '- [%s](docs/adr/%s)\n' "$title" "$(basename "$f")"
            done
            printf '\n'

            printf '# Architecture\n\n'
            for f in site/src/docs/architecture/*.md; do
              [ -f "$f" ] || continue
              title=$(grep -m1 '^# ' "$f" | sed 's/^# //')
              printf -- '- [%s](docs/architecture/%s)\n' "$title" "$(basename "$f")"
            done
            printf '\n'

            if compgen -G 'site/src/docs/user/*.md' > /dev/null 2>&1; then
              printf '# For Users\n\n'
              for f in site/src/docs/user/*.md; do
                [ -f "$f" ] || continue
                title=$(grep -m1 '^# ' "$f" | sed 's/^# //')
                printf -- '- [%s](docs/user/%s)\n' "$title" "$(basename "$f")"
              done
              printf '\n'
            fi

            if compgen -G 'site/src/docs/maintainer/*.md' > /dev/null 2>&1; then
              printf '# Maintainer\n\n'
              for f in site/src/docs/maintainer/*.md; do
                [ -f "$f" ] || continue
                title=$(grep -m1 '^# ' "$f" | sed 's/^# //')
                printf -- '- [%s](docs/maintainer/%s)\n' "$title" "$(basename "$f")"
              done
              printf '\n'
            fi
          } > site/src/SUMMARY.md

          cat > site/book.toml <<'EOF'
          [book]
          title = "Ken"
          authors = ["The Ken contributors"]
          language = "en"
          src = "src"

          [output.html]
          default-theme = "light"
          preferred-dark-theme = "navy"
          git-repository-url = "https://github.com/t11z/ken"
          edit-url-template = "https://github.com/t11z/ken/edit/main/{path}"
          EOF

      - name: build book
        run: mdbook build site

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/book

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v5
