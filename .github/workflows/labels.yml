name: labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/labels.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: sync labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: apply labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: true
