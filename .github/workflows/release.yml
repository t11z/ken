name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-agent-msi:
    name: build agent MSI
    runs-on: windows-latest
    outputs:
      msi-artifact: ${{ steps.build.outputs.msi-path }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: build agent release
        run: cargo build -p ken-agent --release

      - name: install WiX
        run: dotnet tool install --global wix

      - name: accept WiX OSMF EULA
        run: wix eula accept wix7

      - name: build MSI
        id: build
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $agentBin = (Resolve-Path "target\release\ken-agent.exe").Path
          $outDir   = "crates\ken-agent\installer\target"
          $msiPath  = "$outDir\ken-agent.msi"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          wix build `
            "crates/ken-agent/installer/ken-agent.wxs" `
            -out $msiPath `
            -d Version=$version `
            -d AgentBin=$agentBin `
            -arch x64

          Write-Output "msi-path=$msiPath" >> $env:GITHUB_OUTPUT

      # Phase 1 uses a self-signed certificate (ADR-0011 Â§Consequences).
      # The signing step is present so the Authenticode verification path
      # in the agent (WinVerifyTrust, ADR-0011 step 4) is exercisable
      # against a real signature. OV/EV certificate is Phase 2 work.
      - name: sign MSI (Phase 1 â€” self-signed)
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=Ken Project (Phase 1 self-signed)" `
            -Type CodeSigningCert `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(2)

          $signtool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Filter signtool.exe -Recurse |
            Where-Object { $_.FullName -match "\\x64\\" } |
            Sort-Object FullName |
            Select-Object -Last 1

          if (-not $signtool) { throw "signtool.exe not found in Windows Kits" }

          & $signtool.FullName sign `
            /sha1 $cert.Thumbprint `
            /fd SHA256 `
            /d "Ken Agent" `
            "crates\ken-agent\installer\target\ken-agent.msi"

      - name: upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ken-agent-msi
          path: crates/ken-agent/installer/target/ken-agent.msi
          if-no-files-found: error

  build-server-image:
    name: build server container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ken-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/ken-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: publish GitHub release
    needs: [build-agent-msi, build-server-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download MSI
        uses: actions/download-artifact@v4
        with:
          name: ken-agent-msi
          path: ./artifacts

      - name: generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: Ken ${{ steps.notes.outputs.version }}
          body: |
            ## Ken ${{ steps.notes.outputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v${{ steps.notes.outputs.version }}/CHANGELOG.md) for the full list of changes.

            ### Artifacts

            - **Agent MSI** (Windows): `ken-agent.msi` â€” attached below, signed with the Ken project certificate.
            - **Server container**: `ghcr.io/${{ github.repository_owner }}/ken-server:${{ steps.notes.outputs.version }}` â€” multi-arch (amd64, arm64).

            ### Trust boundaries

            This release, like every release, complies with [ADR-0001](https://github.com/${{ github.repository }}/blob/v${{ steps.notes.outputs.version }}/docs/adr/0001-trust-boundaries-and-current-scope.md). If any behavior in this release violates those boundaries, please file an issue immediately.
          files: |
            ./artifacts/ken-agent.msi
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
