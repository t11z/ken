version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "area/ci"
      - "type/refactor"
    commit-message:
      prefix: "deps"
    groups:
      rust-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "area/ci"
      - "type/refactor"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types:
          - minor
          - patch
