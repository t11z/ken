# cargo-deny configuration for the Ken workspace.
# Run with: cargo deny check

[advisories]
# Deny crates with known security vulnerabilities.
version = 2
ignore = []

[licenses]
version = 2
# Ken is AGPL-3.0. Allow dependencies under these compatible licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    # webpki-roots uses CDLA-Permissive-2.0 for Mozilla's CA certificate data
    "CDLA-Permissive-2.0",
    # Some crates use these dual or combined forms
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

# Ring uses a custom ISC-style license that cargo-deny cannot classify.
[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
